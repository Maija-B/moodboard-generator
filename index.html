<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MOODBOARD — UI Design Generator</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@400;500&family=Instrument+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --ink: #0a0a0a;
      --paper: #f5f2ec;
      --accent: #ff3c00;
      --mid: #8a8478;
      --border: #d4d0c8;
    }

    html { font-size: 16px; }

    body {
      background: var(--paper);
      color: var(--ink);
      font-family: 'Instrument Sans', sans-serif;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* HEADER */
    header {
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      align-items: center;
      padding: 24px 48px;
      border-bottom: 2px solid var(--ink);
      position: sticky;
      top: 0;
      background: var(--paper);
      z-index: 100;
    }

    .header-left {
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--mid);
    }

    .header-title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 28px;
      letter-spacing: 0.08em;
      text-align: center;
    }

    .header-right {
      text-align: right;
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--mid);
    }

    /* HERO INPUT */
    .hero {
      padding: 80px 48px 60px;
      border-bottom: 2px solid var(--ink);
      position: relative;
      overflow: hidden;
    }

    .hero-label {
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--mid);
      margin-bottom: 24px;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .hero-label::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    .input-row {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 0;
      border: 2px solid var(--ink);
      background: white;
    }

    #prompt-input {
      border: none;
      outline: none;
      padding: 28px 36px;
      font-family: 'DM Serif Display', serif;
      font-size: 28px;
      background: transparent;
      color: var(--ink);
      width: 100%;
    }

    #prompt-input::placeholder {
      color: var(--border);
    }

    #generate-btn {
      background: var(--ink);
      color: var(--paper);
      border: none;
      padding: 28px 48px;
      font-family: 'Bebas Neue', sans-serif;
      font-size: 22px;
      letter-spacing: 0.1em;
      cursor: pointer;
      transition: background 0.2s, color 0.2s;
      white-space: nowrap;
    }

    #generate-btn:hover { background: var(--accent); }
    #generate-btn:disabled { background: var(--mid); cursor: not-allowed; }

    .hero-sub {
      margin-top: 20px;
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      color: var(--mid);
      letter-spacing: 0.1em;
    }

    /* LOADING */
    #loading {
      display: none;
      padding: 80px 48px;
      text-align: center;
    }

    .loading-text {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 64px;
      letter-spacing: 0.05em;
      color: var(--ink);
      animation: pulse 1.2s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.2; }
    }

    /* MOODBOARD */
    #moodboard-section {
      display: none;
      animation: fadeUp 0.6s ease forwards;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(24px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* BOARD HEADER */
    .board-header {
      display: grid;
      grid-template-columns: 1fr 1fr;
      border-bottom: 2px solid var(--ink);
    }

    .board-title-block {
      padding: 48px;
      border-right: 2px solid var(--ink);
    }

    .board-issue {
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--mid);
      margin-bottom: 16px;
    }

    #board-name {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(48px, 6vw, 96px);
      line-height: 0.95;
      letter-spacing: 0.02em;
      color: var(--ink);
    }

    .board-rationale-block {
      padding: 48px;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
    }

    .rationale-label {
      font-family: 'DM Mono', monospace;
      font-size: 10px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--mid);
      margin-bottom: 16px;
    }

    #board-rationale {
      font-family: 'DM Serif Display', serif;
      font-size: 18px;
      line-height: 1.65;
      color: var(--ink);
    }

    /* COLORS ROW */
    #colors-container {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      border-bottom: 2px solid var(--ink);
    }

    .color-swatch {
      height: 160px;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      padding: 16px;
      border-right: 2px solid var(--ink);
      position: relative;
      transition: height 0.3s ease;
    }

    .color-swatch:last-child { border-right: none; }

    .color-swatch:hover { height: 200px; }

    .color-hex {
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      letter-spacing: 0.05em;
      font-weight: 500;
    }

    .color-role {
      font-family: 'DM Mono', monospace;
      font-size: 10px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      margin-top: 4px;
      opacity: 0.7;
    }

    /* IMAGES + DETAILS GRID */
    .board-body {
      display: grid;
      grid-template-columns: 1fr 400px;
      border-bottom: 2px solid var(--ink);
    }

    #images-container {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      border-right: 2px solid var(--ink);
    }

    #images-container img {
      width: 100%;
      height: 320px;
      object-fit: cover;
      display: block;
      border-right: 2px solid var(--ink);
      transition: transform 0.4s ease;
    }

    #images-container img:last-child { border-right: none; }
    #images-container img:hover { transform: scale(1.03); }

    .board-details {
      display: flex;
      flex-direction: column;
    }

    /* FONTS */
    .fonts-block {
      padding: 36px;
      border-bottom: 2px solid var(--ink);
      flex: 1;
    }

    .block-label {
      font-family: 'DM Mono', monospace;
      font-size: 10px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--mid);
      margin-bottom: 20px;
    }

    .font-item {
      margin-bottom: 20px;
    }

    .font-name {
      font-size: 28px;
      line-height: 1.1;
      color: var(--ink);
    }

    .font-meta {
      font-family: 'DM Mono', monospace;
      font-size: 10px;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--mid);
      margin-top: 6px;
    }

    /* KEYWORDS */
    .keywords-block {
      padding: 36px;
      border-bottom: 2px solid var(--ink);
    }

    #keywords-container {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 4px;
    }

    .keyword-tag {
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      padding: 6px 14px;
      border: 1.5px solid var(--ink);
      color: var(--ink);
      transition: background 0.15s, color 0.15s;
      cursor: default;
    }

    .keyword-tag:hover {
      background: var(--ink);
      color: var(--paper);
    }

    /* COMPONENTS */
    .components-block {
      padding: 36px;
    }

    .component-item {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      padding: 10px 0;
      border-bottom: 1px solid var(--border);
    }

    .component-item:last-child { border-bottom: none; }

    .component-key {
      font-family: 'DM Mono', monospace;
      font-size: 10px;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--mid);
    }

    .component-val {
      font-family: 'Instrument Sans', sans-serif;
      font-size: 13px;
      color: var(--ink);
      text-align: right;
      max-width: 60%;
    }

    /* EDIT BAR */
    #edit-section {
      padding: 0;
      border-top: 2px solid var(--ink);
      background: var(--ink);
    }

    .edit-label {
      padding: 16px 48px 0;
      font-family: 'DM Mono', monospace;
      font-size: 10px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--mid);
    }

    .edit-row {
      display: grid;
      grid-template-columns: 1fr auto;
    }

    #edit-input {
      border: none;
      outline: none;
      padding: 24px 48px;
      font-family: 'DM Serif Display', serif;
      font-size: 22px;
      background: transparent;
      color: var(--paper);
      width: 100%;
    }

    #edit-input::placeholder { color: #555; }

    #update-btn {
      background: var(--accent);
      color: white;
      border: none;
      padding: 24px 48px;
      font-family: 'Bebas Neue', sans-serif;
      font-size: 20px;
      letter-spacing: 0.1em;
      cursor: pointer;
      transition: opacity 0.2s;
    }

    #update-btn:hover { opacity: 0.85; }
    #update-btn:disabled { opacity: 0.4; cursor: not-allowed; }

    /* FOOTER */
    footer {
      padding: 24px 48px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-top: 1px solid var(--border);
    }

    .footer-text {
      font-family: 'DM Mono', monospace;
      font-size: 10px;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--mid);
    }

    #board-id {
      font-family: 'DM Mono', monospace;
      font-size: 10px;
      letter-spacing: 0.1em;
      color: var(--mid);
    }

    /* DECORATIVE */
    .accent-bar {
      height: 4px;
      background: var(--accent);
      width: 60px;
      margin-bottom: 20px;
    }

    @media (max-width: 900px) {
      header { padding: 20px 24px; }
      .hero { padding: 48px 24px 40px; }
      #prompt-input { font-size: 20px; padding: 20px 24px; }
      #generate-btn { padding: 20px 28px; font-size: 18px; }
      .board-header { grid-template-columns: 1fr; }
      .board-title-block { border-right: none; border-bottom: 2px solid var(--ink); }
      #colors-container { grid-template-columns: repeat(5, 1fr); }
      .board-body { grid-template-columns: 1fr; }
      #images-container { border-right: none; border-bottom: 2px solid var(--ink); }
      .board-details { border-top: none; }
      .edit-row { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

  <header>
    <div class="header-left">Vol. 01 — 2026</div>
    <div class="header-title">MOODBOARD</div>
    <div class="header-right">UI Design Generator</div>
  </header>

  <!-- INPUT -->
  <section class="hero">
    <div class="hero-label">Describe your product</div>
    <div class="input-row">
      <input type="text" id="prompt-input" placeholder="A fintech app for Gen Z investors…" />
      <button id="generate-btn">Generate</button>
    </div>
    <div class="hero-sub">↳ Powered by Gemini AI + Unsplash</div>
  </section>

  <!-- LOADING -->
  <div id="loading">
    <div class="loading-text">Designing…</div>
  </div>

  <!-- MOODBOARD OUTPUT -->
  <div id="moodboard-section">

    <!-- TITLE + RATIONALE -->
    <div class="board-header">
      <div class="board-title-block">
        <div class="board-issue">UI Mood Board</div>
        <div class="accent-bar"></div>
        <div id="board-name">—</div>
      </div>
      <div class="board-rationale-block">
        <div class="rationale-label">Design Rationale</div>
        <div id="board-rationale">—</div>
      </div>
    </div>

    <!-- COLOR SWATCHES -->
    <div id="colors-container"></div>

    <!-- IMAGES + DETAILS -->
    <div class="board-body">
      <div id="images-container"></div>
      <div class="board-details">
        <div class="fonts-block">
          <div class="block-label">Typography</div>
          <div class="font-item">
            <div class="font-name" id="font-1">—</div>
            <div class="font-meta" id="font-1-meta">—</div>
          </div>
          <div class="font-item">
            <div class="font-name" id="font-2">—</div>
            <div class="font-meta" id="font-2-meta">—</div>
          </div>
        </div>
        <div class="keywords-block">
          <div class="block-label">Keywords</div>
          <div id="keywords-container"></div>
        </div>
        <div class="components-block">
          <div class="block-label">Components</div>
          <div id="components-container"></div>
        </div>
      </div>
    </div>

    <!-- EDIT BAR -->
    <div id="edit-section">
      <div class="edit-label">Refine this board</div>
      <div class="edit-row">
        <input type="text" id="edit-input" placeholder="Make it warmer and more playful…" />
        <button id="update-btn">Update</button>
      </div>
    </div>

  </div>

  <footer>
    <div class="footer-text">MOODBOARD — AI UI Design Generator</div>
    <div id="board-id"></div>
  </footer>

  <script>
    const RAILWAY_URL = 'moodboard-generator-production.up.railway.app'
    let currentBoard = null
    let currentBoardId = null

    const generateBtn = document.getElementById('generate-btn')
    const updateBtn = document.getElementById('update-btn')
    const loading = document.getElementById('loading')
    const moodboardSection = document.getElementById('moodboard-section')

    generateBtn.addEventListener('click', async () => {
      const prompt = document.getElementById('prompt-input').value.trim()
      if (!prompt) return

      generateBtn.disabled = true
      generateBtn.textContent = 'Working…'
      loading.style.display = 'block'
      moodboardSection.style.display = 'none'

      try {
        const response = await fetch(`${RAILWAY_URL}/generate`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ prompt })
        })
        const { id, board } = await response.json()
        currentBoard = board
        currentBoardId = id
        renderBoard(board)
        document.getElementById('board-id').textContent = `Board ID: ${id}`
        loading.style.display = 'none'
        moodboardSection.style.display = 'block'
        moodboardSection.scrollIntoView({ behavior: 'smooth' })
      } catch (err) {
        alert('Something went wrong. Check your server is running.')
        loading.style.display = 'none'
      }

      generateBtn.disabled = false
      generateBtn.textContent = 'Generate'
    })

    updateBtn.addEventListener('click', async () => {
      const instruction = document.getElementById('edit-input').value.trim()
      if (!instruction || !currentBoard) return

      updateBtn.disabled = true
      updateBtn.textContent = 'Updating…'

      try {
        const response = await fetch(`${RAILWAY_URL}/edit`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            currentBoard,
            editInstruction: instruction,
            boardId: currentBoardId
          })
        })
        const { id, board } = await response.json()
        currentBoard = board
        currentBoardId = id
        renderBoard(board)
        document.getElementById('edit-input').value = ''
      } catch (err) {
        alert('Something went wrong. Try again.')
      }

      updateBtn.disabled = false
      updateBtn.textContent = 'Update'
    })

    function renderBoard(board) {
      // Name + rationale
      document.getElementById('board-name').textContent = board.name
      document.getElementById('board-rationale').textContent = board.rationale

      // Load Google Fonts dynamically
      const fontNames = board.fonts.map(f => f.name.replace(/ /g, '+')).join('&family=')
      const link = document.createElement('link')
      link.rel = 'stylesheet'
      link.href = `https://fonts.googleapis.com/css2?family=${fontNames}&display=swap`
      document.head.appendChild(link)

      // Fonts
      const font1El = document.getElementById('font-1')
      font1El.textContent = board.fonts[0].name
      font1El.style.fontFamily = `'${board.fonts[0].name}', serif`
      document.getElementById('font-1-meta').textContent = `${board.fonts[0].role} · ${board.fonts[0].weight}`

      const font2El = document.getElementById('font-2')
      font2El.textContent = board.fonts[1].name
      font2El.style.fontFamily = `'${board.fonts[1].name}', sans-serif`
      document.getElementById('font-2-meta').textContent = `${board.fonts[1].role} · ${board.fonts[1].weight}`

      // Colors
      const colorsContainer = document.getElementById('colors-container')
      colorsContainer.innerHTML = ''
      board.colors.forEach(color => {
        const swatch = document.createElement('div')
        swatch.className = 'color-swatch'
        swatch.style.backgroundColor = color.hex
        const light = isLight(color.hex)
        swatch.innerHTML = `
          <div class="color-hex" style="color:${light ? '#0a0a0a' : '#f5f2ec'}">${color.hex}</div>
          <div class="color-role" style="color:${light ? '#0a0a0a' : '#f5f2ec'}">${color.role}</div>
        `
        colorsContainer.appendChild(swatch)
      })

      // Images
      const imagesContainer = document.getElementById('images-container')
      imagesContainer.innerHTML = ''
      board.images.forEach(img => {
        const image = document.createElement('img')
        image.src = img.url
        image.alt = 'UI inspiration'
        imagesContainer.appendChild(image)
      })

      // Keywords
      const keywordsContainer = document.getElementById('keywords-container')
      keywordsContainer.innerHTML = ''
      board.keywords.forEach(keyword => {
        const tag = document.createElement('span')
        tag.className = 'keyword-tag'
        tag.textContent = keyword
        keywordsContainer.appendChild(tag)
      })

      // Components
      const componentsContainer = document.getElementById('components-container')
      componentsContainer.innerHTML = ''
      Object.entries(board.components).forEach(([key, val]) => {
        const item = document.createElement('div')
        item.className = 'component-item'
        item.innerHTML = `
          <span class="component-key">${key.replace(/([A-Z])/g, ' $1').trim()}</span>
          <span class="component-val">${val}</span>
        `
        componentsContainer.appendChild(item)
      })
    }

    function isLight(hex) {
      const r = parseInt(hex.slice(1, 3), 16)
      const g = parseInt(hex.slice(3, 5), 16)
      const b = parseInt(hex.slice(5, 7), 16)
      return (r * 299 + g * 587 + b * 114) / 1000 > 128
    }

    // Enter key triggers generate
    document.getElementById('prompt-input').addEventListener('keydown', e => {
      if (e.key === 'Enter') generateBtn.click()
    })

    document.getElementById('edit-input').addEventListener('keydown', e => {
      if (e.key === 'Enter') updateBtn.click()
    })
  </script>

</body>
</html>
